# Export both the flatscreen (Windows Desktop) and the OpenXR build with the
# merged double-precision editor, pack each as an MSIX, and publish both to a
# single GitHub release.  The game source (godot-loop-slice) is checked out
# beside this repo; the merged editor + double Windows template come from
# v-sekai-multiplayer-fabric/godot-images.
name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Four-part package version (e.g. 0.1.0.0)
        required: true
        default: 0.1.0.0
      godot_images_tag:
        description: godot-images release tag providing the merged editor + double templates
        required: true
      editor_asset:
        description: Windows editor asset name in that release
        required: true
        default: godot.windows.editor.double.x86_64.exe
      windows_template_asset:
        description: Windows double export template asset name
        required: true
        default: godot.windows.template_release.double.x86_64.exe

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      HAS_PFX: ${{ secrets.LOOP_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with: { path: fabric-godot-packaging }
      - uses: actions/checkout@v4
        with: { repository: v-sekai-multiplayer-fabric/godot-loop-slice, path: godot-loop-slice }

      - name: Fetch merged editor + Windows template from godot-images
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.godot_images_tag }}
        run: |
          mkdir -p tools templates
          gh release download "$TAG" -R v-sekai-multiplayer-fabric/godot-images \
            -p '${{ github.event.inputs.editor_asset }}' -D tools
          gh release download "$TAG" -R v-sekai-multiplayer-fabric/godot-images \
            -p '${{ github.event.inputs.windows_template_asset }}' -D templates

      - name: Export Windows Desktop + OpenXR builds
        shell: bash
        working-directory: godot-loop-slice
        run: |
          GODOT="$GITHUB_WORKSPACE/tools/${{ github.event.inputs.editor_asset }}"
          tmpl="$GITHUB_WORKSPACE/templates/${{ github.event.inputs.windows_template_asset }}"
          sed -i "s|custom_template/release=.*|custom_template/release=\"$tmpl\"|" export_presets.cfg
          mkdir -p build/windows build/openxr
          "$GODOT" --headless --import . || true
          "$GODOT" --headless --export-release "Windows Desktop" build/windows/loop-slice.exe
          "$GODOT" --headless --export-release "OpenXR" build/openxr/loop-slice.exe
          ls -la build/windows build/openxr

      - name: Import signing cert
        if: ${{ env.HAS_PFX == 'true' }}
        shell: bash
        run: echo "${{ secrets.LOOP_PFX_BASE64 }}" | base64 -d > loop.pfx

      - name: Pack + sign MSIXes
        shell: pwsh
        run: |
          $pfx = if (Test-Path loop.pfx) { @("-PfxPath","loop.pfx","-PfxPassword","${{ secrets.LOOP_PFX_PASSWORD }}") } else { @() }
          $ver = "${{ github.event.inputs.version }}"
          pwsh fabric-godot-packaging/msix/pack.ps1 -BinDir godot-loop-slice/build/windows -Version $ver -OutDir dist @pfx
          Rename-Item "dist/v-sekai-loop-slice-$ver.msix" "v-sekai-loop-slice-desktop-$ver.msix"
          pwsh fabric-godot-packaging/msix/pack.ps1 -BinDir godot-loop-slice/build/openxr -Version $ver -OutDir dist @pfx
          Rename-Item "dist/v-sekai-loop-slice-$ver.msix" "v-sekai-loop-slice-openxr-$ver.msix"

      - uses: actions/upload-artifact@v4
        with:
          name: loop-slice-windows-msix
          path: dist/v-sekai-loop-slice-desktop-*.msix

      - uses: actions/upload-artifact@v4
        with:
          name: loop-slice-openxr-msix
          path: dist/v-sekai-loop-slice-openxr-*.msix

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ver="${{ github.event.inputs.version }}"
          pre=""; case "$ver" in *-*) pre="--prerelease" ;; esac
          gh release create "windows-v$ver" \
            dist/v-sekai-loop-slice-desktop-*.msix \
            dist/v-sekai-loop-slice-openxr-*.msix \
            --title "loop-slice Windows v$ver" $pre \
            --notes "$(cat <<'EOF'
Windows builds (x86_64, double precision) for the loot-action loop-slice.

**Flatscreen** (\`-desktop-\`): standard monitor play, no XR runtime required.

**OpenXR** (\`-openxr-\`): requires an OpenXR runtime installed and active before launch. The active runtime attaches automatically.

**Install**: sideload the MSIX (trust the TEST cert if no production cert is configured), then launch *Loot-Action Loop Slice* from the Start menu.
EOF
            )" \
            || gh release upload "windows-v$ver" \
                 dist/v-sekai-loop-slice-desktop-*.msix \
                 dist/v-sekai-loop-slice-openxr-*.msix \
                 --clobber
